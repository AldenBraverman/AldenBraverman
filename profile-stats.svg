<svg xmlns="http://www.w3.org/2000/svg" width="860" height="220" viewBox="0 0 860 220">
  <style>
    .bg { fill: #0d1117; }
    .title { fill: #c9d1d9; font: 700 24px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
    .meta { fill: #8b949e; font: 500 14px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
  </style>
  <rect class="bg" x="0" y="0" width="860" height="220" rx="12" />
