name: Update Profile Stats

on:
  schedule:
    - cron: "15 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-profile-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate profile stats artifacts
        env:
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          PROFILE_STATS_USERNAME: ${{ github.repository_owner }}
          PROFILE_STATS_RECENT_DAYS: "180"
        run: python ".github/scripts/generate_profile_stats.py"

      - name: Commit generated stats artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile stats artifacts"
          file_pattern: "profile-stats.svg profile-stats.json"
